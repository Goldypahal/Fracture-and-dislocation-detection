name: Clinical API CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Clinical Verification Suite
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Headless Linux OS Dependencies (OpenCV Requirements)
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1 libglib2.0-0

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f files/requirements.txt ]; then pip install -r files/requirements.txt; fi
        pip install pytest httpx

    - name: Execute Automated Unit Tests
      env:
        PYTHONPATH: files
      run: |
        pytest tests/
